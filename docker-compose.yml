services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev-server
    ports:
      - "3001:3001"
      # Dev server ports for repo run commands
      - "3000:3000"
      - "3002-3010:3002-3010"
      - "4200:4200"
      - "5000-5001:5000-5001"
      - "8000:8000"
      - "8080-8090:8080-8090"
      - "9000:9000"
    volumes:
      - ./server/src:/app/server/src
      - ./shared:/app/shared
      - ./data:/app/server/data
      # Mount host filesystem so git repos are accessible
      - /home:/host/home
      - /mnt:/host/mnt
      # Mount SSH keys for git remote operations
      - ~/.ssh:/root/.ssh:ro
      # Mount gh CLI config for HTTPS credential helper
      - ~/.config/gh:/root/.config/gh:ro
    environment:
      - PORT=3001
      - NODE_ENV=development
      - CORS_ORIGINS=http://localhost:3200,http://127.0.0.1:3200
      - DATA_DIR=/app/server/data
      - GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=no
      - AZURE_DEVOPS_PAT=${AZURE_DEVOPS_PAT:-}
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev-client
    ports:
      - "3200:5173"
    volumes:
      - ./client/src:/app/client/src
      - ./client/public:/app/client/public
      - ./client/index.html:/app/client/index.html
      - ./shared:/app/shared
    environment:
      - VITE_API_URL=http://server:3001
    depends_on:
      - server
    restart: unless-stopped
